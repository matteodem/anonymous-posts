<section class="rounded-2xl bg-white p-6 shadow-sm">
  <div class="mb-6">
    <h1 class="text-3xl font-bold">Create anonymous post</h1>
    <p class="mt-2 text-gray-600">
      Write a Markdown post and share it with a private link.
    </p>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
    <div>
      <label class="mb-1 block text-sm font-medium">Title</label>
      <input
        type="text"
        formControlName="title"
        class="w-full rounded-xl border border-gray-300 px-4 py-3 outline-none focus:border-gray-900"
        placeholder="My anonymous post"
      />

      <p
        *ngIf="form.controls['title'].touched && form.controls['title'].invalid"
        class="mt-1 text-sm text-red-600"
      >
        Title is required.
      </p>
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium">Slug optional</label>
      <input
        type="text"
        formControlName="slug"
        class="w-full rounded-xl border border-gray-300 px-4 py-3 outline-none focus:border-gray-900"
        placeholder="my-anonymous-post"
      />

      <p class="mt-1 text-sm text-gray-500">
        Leave empty to generate it from the title.
      </p>
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium">Content Markdown</label>
      <textarea
        formControlName="content"
        rows="12"
        class="w-full resize-y rounded-xl border border-gray-300 px-4 py-3 font-mono text-sm outline-none focus:border-gray-900"
        placeholder="# Hello&#10;&#10;Write your post here..."
      ></textarea>

      <p
        *ngIf="form.controls['content'].touched && form.controls['content'].invalid"
        class="mt-1 text-sm text-red-600"
      >
        Content is required.
      </p>
    </div>

    <p *ngIf="errorMessage" class="text-sm text-red-600">
      {{ errorMessage }}
    </p>

    <button
      type="submit"
      [disabled]="isSubmitting"
      class="rounded-xl bg-gray-900 px-5 py-3 font-medium text-white hover:bg-gray-700 disabled:cursor-not-allowed disabled:opacity-50"
    >
      {{ isSubmitting ? 'Saving...' : 'Save Post' }}
    </button>
  </form>
</section>
